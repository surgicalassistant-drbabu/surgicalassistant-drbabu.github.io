<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babs' Practice | Surgical Assistance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1c2a23;   
            --bg-color: #f4f9f9;       
            --text-color: #2c3e50;
            --main-card: #d9d9d8; 
            --placeholder-grey: #7a7a7a; 
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--main-card);
            padding: 25px 30px;
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-top: 6px solid var(--primary-dark);
            margin-top: 15px;
            text-align: center;
        }

        .profile-main {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            display: inline-block;
        }

        header { margin-bottom: 15px; }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-dark);
            font-size: 1.9rem;
            margin: 0 0 4px 0;
            letter-spacing: -0.5px;
        }

        p.description {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #4a4a4a;
            margin: 0 0 10px 0;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }

        .logo-header {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%; 
            margin: 0 auto;
            display: block;
        }

        form {
            text-align: left;
            margin-top: 20px;
            border-top: 1px solid rgba(28, 42, 35, 0.1);
            padding-top: 20px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-group { margin-bottom: 16px; flex: 1; }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 1.2px; 
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: rgba(255, 255, 255, 0.25); 
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.5);
            border-color: var(--primary-dark);
        }

        button {
            width: 100%;
            background-color: var(--primary-dark);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover { 
            background-color: #23362d; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(28, 42, 35, 0.2);
        }

        .wa-icon { width: 18px; height: 18px; fill: white; }

        footer {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #777;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="HeadShot.jpeg" alt="Babs" class="profile-main">

    <header>
        <h1>Book Assistance</h1>
        <p class="description">
            Trusted by 20+ surgeons across Cape Town.
        </p>
        <img src="logo.png" alt="Logo" class="logo-header">
    </header>

    <form id="practiceForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Dr. Jane Smith" required>
        </div>
        
        <div class="form-group">
            <label for="case">Case Details</label>
            <input type="text" id="case" placeholder="e.g. Total Hip Replacement" required>
        </div>

        <div class="form-group">
            <label for="hospital">Hospital</label>
            <input list="hospital-options" id="hospital" placeholder="Select or type hospital..." required>
            <datalist id="hospital-options">
                <option value="Mediclinic Milnerton">
                <option value="Mediclinic Cape Gate">
                <option value="Mediclinic Panorama">
                <option value="Mediclinic Louis Leipoldt">
                <option value="Mediclinic Durbanville">
                <option value="Mediclinic Cape Town">
                <option value="Mediclinic Constantiaberg">
                <option value="Netcare Christiaan Barnard">
                <option value="Netcare N1 City">
                <option value="Netcare Kuilsriver">
                <option value="Netcare Blaauwberg">
                <option value="Life Kingsbury">
                <option value="Life Vincent Pallotti">
                <option value="Intercare Century City">
                <option value="Advanced Health Surgical Centre (Panorama)">
                <option value="Advanced Health Surgical Centre (Durbanville)"></option>
                <option value="Cure Day Bellville">
                <option value="Cure Day Foreshore">
                <option value="Rondebosch Medical Centre">
                <option value="Melomed Bellville">
                <option value="Melomed Mitchells Plein">
            </datalist>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="text" id="date" placeholder="DD-MM-YYYY" 
                       onfocus="handleInputFocus(this, 'date')" 
                       onblur="if(!this.value)this.type='text'" required>
            </div>
            <div class="form-group">
                <label for="time">Time</label>
                <input type="text" id="time" placeholder="HH:MM" 
                       onfocus="handleInputFocus(this, 'time')" 
                       onblur="if(!this.value)this.type='text'" required>
            </div>
        </div>

        <button type="submit">
            <svg class="wa-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.6-9.3 1.9-3.7 .9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.5 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
            </svg>
            Send via WhatsApp
        </button>
    </form>

    <footer>
        &copy; 2026 Dr Babu's Practice &bull; Cape Town, SA
    </footer>
</div>

<script>
    const dateField = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateField.setAttribute('min', today);

    function handleInputFocus(input, type) {
        input.type = type;
        if ('showPicker' in HTMLInputElement.prototype) {
            try {
                input.showPicker();
            } catch (error) {}
        }
    }

    document.getElementById('practiceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const number = "27826857224"; 
        
        const name = document.getElementById('name').value;
        const caseDetails = document.getElementById('case').value;
        const hospital = document.getElementById('hospital').value;
        const dateInput = document.getElementById('date').value;
        const timeInput = document.getElementById('time').value;

        const dateParts = dateInput.split('-');
        const formattedDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;

        const text = `Hello Babitha!

*New Booking Request*
--------------------------
*Surgeon:* ${name}
*Case:* ${caseDetails}
*Hospital:* ${hospital}
*Date:* ${formattedDate}
*Time:* ${timeInput}`;

        window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`, '_blank');
    });
</script>

</body>
</html>
