<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babs' Practice | Surgical Assistance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1c2a23;   
            --bg-color: #f4f9f9;       
            --text-color: #2c3e50;
            --main-card: #d9d9d8; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 400px;
            background: var(--main-card);
            padding: 25px 30px;
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-top: 6px solid var(--primary-dark);
            margin-top: 15px;
            text-align: center;
        }

        .profile-main { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 1.9rem; margin: 0; }
        p.description { font-size: 0.85rem; color: #4a4a4a; margin-bottom: 20px; }

        form { text-align: left; border-top: 1px solid rgba(28, 42, 35, 0.1); padding-top: 20px; }
        .form-group { margin-bottom: 16px; position: relative; }
        .form-row { display: flex; gap: 12px; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.7rem; color: var(--primary-dark); text-transform: uppercase; letter-spacing: 1.2px; }

        /* THE FIX: Native pickers often look weird as type="date" by default. 
           We style them to look like text inputs until they are clicked. */
        input {
            width: 100%; padding: 14px;
            background-color: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px; box-sizing: border-box;
            font-size: 16px; color: var(--text-color);
            -webkit-appearance: none;
            min-height: 50px;
        }

        /* Forces the placeholder to show on date/time inputs on some browsers */
        input[type="date"]:before, input[type="time"]:before {
            content: attr(placeholder);
            color: var(--text-color);
            margin-right: 0.5em;
        }
        input[type="date"]:focus:before, input[type="date"]:valid:before,
        input[type="time"]:focus:before, input[type="time"]:valid:before {
            content: "";
            display: none;
        }

        .dropdown-wrapper { position: relative; }
        .hospital-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: white; border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-height: 200px; overflow-y: auto;
            display: none; z-index: 1000; margin-top: 4px;
        }
        .hospital-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.9rem; }
        .hospital-item.custom-option { font-style: italic; color: #1c2a23; font-weight: 600; background: #f0f4f2; }

        button.submit-btn {
            width: 100%; background-color: var(--primary-dark); color: white;
            padding: 18px; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="HeadShot.jpeg" alt="Babs" class="profile-main">
    <header>
        <h1>Book Assistance</h1>
        <p class="description">Trusted by 20+ surgeons across Cape Town.</p>
    </header>

    <form id="practiceForm" autocomplete="off">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Dr. Jane Smith" required>
        </div>
        
        <div class="form-group">
            <label>Case Details</label>
            <input type="text" id="case" placeholder="e.g. Total Hip Replacement" required>
        </div>

        <div class="form-group dropdown-wrapper">
            <label>Hospital</label>
            <input type="text" id="hospitalInput" placeholder="Select or type hospital..." required>
            <div id="hospitalList" class="hospital-list"></div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1">
                <label>Date</label>
                <input type="date" id="date" placeholder="Date" required>
            </div>
            <div class="form-group" style="flex:1">
                <label>Time</label>
                <input type="time" id="time" placeholder="Time" required>
            </div>
        </div>

        <button type="submit" class="submit-btn">Send via WhatsApp</button>
    </form>
</div>

<script>
    // 1. SET MIN DATE (TODAY)
    const dateInput = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);

    // 2. THE "SINGLE TAP" TRIGGER
    // We attach it to both date and time inputs
    const inputs = [dateInput, document.getElementById('time')];
    inputs.forEach(input => {
        // Trigger on the very first touch or click
        ['touchstart', 'click'].forEach(eventType => {
            input.addEventListener(eventType, function(e) {
                if ('showPicker' in HTMLInputElement.prototype) {
                    try {
                        this.showPicker();
                    } catch (err) {
                        // Fallback: the focus event usually handles it
                    }
                }
            });
        });
    });

    // 3. HOSPITAL LIST DATA & LOGIC
    const hospitals = [
        "Mediclinic Milnerton", "Mediclinic Cape Gate", "Mediclinic Panorama", 
        "Mediclinic Louis Leipoldt", "Mediclinic Durbanville", "Mediclinic Cape Town", 
        "Mediclinic Constantiaberg", "Netcare Christiaan Barnard", "Netcare N1 City", 
        "Netcare Kuilsriver", "Netcare Blaauwberg", "Life Kingsbury", "Life Vincent Pallotti", 
        "Intercare Century City", "Advanced Health Surgical Centre - Durbanville", 
        "Advanced Health Surgical Centre - Panaroma", "Cure Day Bellville", 
        "Cure Day Foreshore", "Rondebosch Medical Centre", "Melomed Bellville", 
        "Melomed Mitchells Plein"
    ];

    const hInput = document.getElementById('hospitalInput');
    const hList = document.getElementById('hospitalList');

    function renderList(filter = "") {
        hList.innerHTML = '';
        const filtered = hospitals.filter(h => h.toLowerCase().includes(filter.toLowerCase()));
        filtered.forEach(h => {
            const div = document.createElement('div');
            div.className = 'hospital-item';
            div.textContent = h;
            div.onmousedown = (e) => { hInput.value = h; hList.style.display = 'none'; };
            hList.appendChild(div);
        });
        if (filter && !hospitals.some(h => h.toLowerCase() === filter.toLowerCase())) {
            const custom = document.createElement('div');
            custom.className = 'hospital-item custom-option';
            custom.textContent = `Use: "${filter}"`;
            hList.appendChild(custom);
        }
        hList.style.display = 'block';
    }

    hInput.onfocus = () => renderList(hInput.value);
    hInput.oninput = (e) => renderList(e.target.value);
    hInput.onblur = () => setTimeout(() => { hList.style.display = 'none'; }, 200);

    // 4. WHATSAPP SUBMISSION
    document.getElementById('practiceForm').onsubmit = (e) => {
        e.preventDefault();
        const dVal = dateInput.value;
        const dParts = dVal.split('-');
        const formattedDate = dParts.length > 2 ? `${dParts[2]}-${dParts[1]}-${dParts[0]}` : dVal;

        const text = `Hello Babitha!\n\n*New Booking Request*\n--------------------------\n*Surgeon:* ${document.getElementById('name').value}\n*Case:* ${document.getElementById('case').value}\n*Hospital:* ${hInput.value}\n*Date:* ${formattedDate}\n*Time:* ${document.getElementById('time').value}`;
        window.open(`https://wa.me/27826857224?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>
</body>
</html>
